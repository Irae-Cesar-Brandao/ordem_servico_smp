<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>OS Profissional Completa</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;background:#eef2f5;margin:0;}
header{background:#2c3e50;color:white;padding:15px;text-align:center;}
.container{max-width:1100px;margin:auto;padding:20px;}
.card{background:white;padding:20px;border-radius:10px;margin-bottom:20px;}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.full{grid-column:1/span 2;}

input,textarea,select{
width:100%;padding:8px;border-radius:5px;border:1px solid #ccc;
}

button{padding:8px;border:none;border-radius:5px;color:white;cursor:pointer;margin-top:5px;}
.salvar{background:#27ae60;}
.pdf{background:#2980b9;}
.whats{background:#25D366;}
.xml{background:#8e44ad;}

.preview{max-width:120px;}

#areaOS{border:2px solid #000;padding:15px;background:white;}

.rodape{font-size:12px;margin-top:15px;border-top:1px solid #000;padding-top:10px;}

table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ccc;padding:5px;}


footer {
    background-color: #2c3e50;; 
    color: white;      
    width: 100%;            
    padding: 8px 0;     
    text-align: center;     
}

</style>

</head>

<body>
<header>
<h2>LUCK WAY® Informática</h2>
<p>CNPJ: 00.000.000/0000-00     Site: https://luckway.com.br</p>
<p>Rua Francisco Saulle, nº 80 - Bairro Centro - Passa Quatro/MG - 37460-000</p>
</header>

<div class="container">

<div class="card">

<h3>Cadastro ORDEM DE SERVIÇO</h3>
<h2>LUCK WAY® Informática</h2>

<div class="grid">

<div>
<label>Nº OS</label>
<input id="numeroOS">
</div>

<div>
<label>Técnico</label>
<input id="tecnico">
</div>

<div>
<label>Nome do Cliente </label>
<input id="cliente">
</div>

<div>
<label>Telefone</label>
<input id="telefone">
</div>

<div class="full">
<label">Endereço </label>
<input id="endereco">
</div>

<div>
<label>Cidade</label>
<input id="cidade">
</div>

<div>
<label>Estado</label>
<input id="estado">
</div>

<div>
<label>Equipamento</label>
<input id="equipamento">
</div>

<div>
<label>Tipo de Atendimento</label>
<select id="tipo">
<option>Remoto</option>
<option>Presencial</option>
<option>Laboratório</option>
</select>
</div>


<div class="full">
<label>Equipamento Extras (bolsas, cabos e periféricos deixados)</label>
<input id="equipamento">
</div>

<div class="full">
<label>Problema</label>
<textarea id="problema"></textarea>
</div>

<div>
<label>Data Início</label>
<input type="date" id="dataInicio">
</div>

<div>
<label>Hora Início</label>
<input type="time" id="horaInicio">
</div>

<div>
<label>Data Final</label>
<input type="date" id="dataFinal">
</div>

<div>
<label>Hora Final</label>
<input type="time" id="horaFinal">
</div>

<div class="full">
<label>Execução</label>
<textarea id="execucao"></textarea>
</div>

<div class="full">
<label>Valor Total= do Serviço + Produtos</label>
<input id="valorServico">
</div>

<div class="full">
<label>Produtos / Peças (descrição)</label>
<textarea id="produtos"></textarea>
</div>

</div>

<label>Foto Inicial</label>
<input type="file" id="fotoInicio">
<img id="previewInicio" class="preview">

<label>Foto Final</label>
<input type="file" id="fotoFim">
<img id="previewFim" class="preview">

<br>

<button class="salvar" onclick="salvar()">Salvar Temp</button>
<button class="pdf" onclick="gerarPDF()">Gerar PDF</button>
<button class="whats" onclick="whats()">WhatsApp</button>
<button class="xml" onclick="exportarXML()">Exportar XML</button>
<button style="background:red" onclick="limparTudo()">Limpar Dados</button>

<input type="file" onchange="importarXML(event)">

</div>

<!-- VISUAL -->
<div id="areaOS" class="card"></div>

<!-- LISTA -->
<div class="card">
<h3>Ordens Registradas</h3>
<table id="listaOS"></table>
</div>

</div>

<script>

let banco = JSON.parse(localStorage.getItem("bancoOS")) || [];

function preview(input,img){
const reader=new FileReader();
reader.onload=()=>img.src=reader.result;
reader.readAsDataURL(input.files[0]);
}

fotoInicio.onchange=()=>preview(fotoInicio,previewInicio);
fotoFim.onchange=()=>preview(fotoFim,previewFim);

function salvar(){

let os={
numero:numeroOS.value,
tecnico:tecnico.value,
cliente:cliente.value,
telefone:telefone.value,
dataInicio:dataInicio.value,
horaInicio:horaInicio.value,
dataFinal:dataFinal.value,
horaFinal:horaFinal.value,
endereco:endereco.value,
equipamento:equipamento.value,
problema:problema.value,
execucao:execucao.value,
valorServico:valorServico.value,
produtos:produtos.value,
img1:previewInicio.src,
img2:previewFim.src
};

let i=banco.findIndex(o=>o.numero===os.numero);

if(i>=0){banco[i]=os;}else{banco.push(os);}

localStorage.setItem("bancoOS",JSON.stringify(banco));

listar();
montarVisual(os);

alert("Salvo!");

}

function montarVisual(o){

areaOS.innerHTML=`
<h2>ORDEM DE SERVIÇO</h2>
<b>Nº:</b> ${o.numero}<br>
<b>Técnico:</b> ${o.tecnico}<br><br>

<b>Cliente:</b> ${o.cliente}<br>
<b>Telefone:</b> ${o.telefone}<br>
<b>Endereço:</b> ${o.endereco}<br><br>

<b>Equipamento:</b> ${o.equipamento}<br><br>

<b>Data/Hora Início:</b> ${o.dataInicio} ${o.horaInicio}<br>
<b>Data/Hora Final:</b> ${o.dataFinal} ${o.horaFinal}<br><br>

<b>Problema:</b><br>${o.problema}<br><br>

<b>Execução:</b><br>${o.execucao}<br><br>

<b>Produtos:</b><br>${o.produtos}<br><br>

<b>Valor total = Serviço + Produtos:</b><h1> R$ ${o.valorServico}</h1><br><br>

<img src="${o.img1}" class="preview">
<img src="${o.img2}" class="preview">

<div class="rodape">
Ciente de que o equipamento deixado para manutenção terá prazo de 180 dias, podendo após esse prazo ser descartado ou reutilizado.
</div>
`;

}

function listar(){

listaOS.innerHTML="<tr><th>Nº</th><th>Cliente</th><th>Ação</th></tr>";

banco.forEach(o=>{
let linha=listaOS.insertRow();

linha.insertCell(0).innerText=o.numero;
linha.insertCell(1).innerText=o.cliente;

linha.insertCell(2).innerHTML=
`<button onclick='editar("${o.numero}")'>Editar</button>`;
});

}

function editar(n){

let o=banco.find(x=>x.numero===n);

for(let k in o){
if(document.getElementById(k)){
document.getElementById(k).value=o[k];
}
}

previewInicio.src=o.img1;
previewFim.src=o.img2;

montarVisual(o);

}

function gerarPDF(){

html2canvas(areaOS).then(canvas=>{
let pdf=new jspdf.jsPDF();
pdf.addImage(canvas.toDataURL("image/png"),"PNG",0,0,210,290);
pdf.save("OS_"+numeroOS.value+".pdf");
});

}

function whats(){

let msg=`OS ${numeroOS.value}
Cliente: ${cliente.value}
Equipamento: ${equipamento.value}
Valor: R$ ${valorServico.value}`;

window.open("https://wa.me/55"+telefone.value+"?text="+encodeURIComponent(msg));

}

/* XML */

function exportarXML(){

let xml="<ordens>";

banco.forEach(o=>{
xml+=`<os>
<numero>${o.numero}</numero>
<cliente>${o.cliente}</cliente>
<valor>${o.valorServico}</valor>
</os>`;
});

xml+="</ordens>";

let blob=new Blob([xml],{type:"text/xml"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="backup.xml";
a.click();

}

function importarXML(e){

let file=e.target.files[0];
let reader=new FileReader();

reader.onload=function(){

let parser=new DOMParser();
let xml=parser.parseFromString(reader.result,"text/xml");

let lista=xml.getElementsByTagName("os");

banco=[];

for(let i=0;i<lista.length;i++){
let o=lista[i];

banco.push({
numero:o.getElementsByTagName("numero")[0].textContent,
cliente:o.getElementsByTagName("cliente")[0].textContent,
valorServico:o.getElementsByTagName("valor")[0].textContent
});
}

localStorage.setItem("bancoOS",JSON.stringify(banco));
listar();

alert("XML importado!");

}

reader.readAsText(file);

}

listar();

/* LIMPEZA DE DADOS REGISTRADOS */
function limparTudo(){

if(confirm("Tem certeza que deseja apagar TODAS as ordens?")){

localStorage.removeItem("bancoOS");

banco = [];

listar();

areaOS.innerHTML = "";

alert("Dados apagados com sucesso!");

}

}

        alert("Copiar/Recortar desativado. Cite o autor! '© 2026 Iraê César Brandão - https://luckway.com.br'");
    }
});


</script>

</body>
